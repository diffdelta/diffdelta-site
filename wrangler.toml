# ─────────────────────────────────────────────────────────
# DiffDelta — Cloudflare Pages Functions config
# This file is for LOCAL DEVELOPMENT only.
# Production bindings + compatibility flags are configured in
# the Cloudflare Pages dashboard (Settings > Functions).
# DO NOT add pages_build_output_dir — it overrides dashboard
# bindings (KV, env vars) with this file, which has them
# commented out.
# ─────────────────────────────────────────────────────────
name = "diffdelta-site"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Environment variables (override in Cloudflare dashboard for production)
[vars]
STRIPE_PRICE_ID = "price_REPLACE_ME"

# KV namespaces — create these in Cloudflare dashboard, then paste IDs here
# For local dev: `wrangler pages dev` auto-creates local KV stores
# For production: bind in Pages > Settings > Functions > KV namespace bindings

# [[kv_namespaces]]
# binding = "KEYS"
# id = "REPLACE_WITH_PRODUCTION_KV_ID"

# [[kv_namespaces]]
# binding = "RATE_LIMITS"
# id = "REPLACE_WITH_PRODUCTION_KV_ID"

# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "REPLACE_WITH_PRODUCTION_KV_ID"

# [[kv_namespaces]]
# binding = "SELF"
# id = "REPLACE_WITH_PRODUCTION_KV_ID"
