# ─────────────────────────────────────────────────────────
# DiffDelta — Cloudflare Pages config
# pages_build_output_dir tells CF Pages to read this file for
# compatibility flags, bindings, and build config.
# KV bindings are still configured in the Pages dashboard.
# ─────────────────────────────────────────────────────────
name = "diffdelta-site"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Environment variables (override in Cloudflare dashboard for production)
[vars]
STRIPE_PRICE_ID = "price_REPLACE_ME"

# KV namespaces — create these in Cloudflare dashboard, then paste IDs here
# For local dev: `wrangler pages dev` auto-creates local KV stores
# For production: bind in Pages > Settings > Functions > KV namespace bindings

# [[kv_namespaces]]
# binding = "KEYS"
# id = "REPLACE_WITH_PRODUCTION_KV_ID"

# [[kv_namespaces]]
# binding = "RATE_LIMITS"
# id = "REPLACE_WITH_PRODUCTION_KV_ID"

# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "REPLACE_WITH_PRODUCTION_KV_ID"

# [[kv_namespaces]]
# binding = "SELF"
# id = "REPLACE_WITH_PRODUCTION_KV_ID"
